name: Daily Auction Report
# Last Refresh: 2026-03-03 (To trigger schedule re-registration)

on:
  # schedule is handled by Cron-job.org (more reliable than GitHub's built-in cron)
  # See cronjob_guide.md for setup instructions
  workflow_dispatch: # Allow manual trigger + Cron-job.org trigger

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run search script
        env:
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          GITHUB_ACTIONS: "true"
        run: python "daily_search.py"

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Automated Report: $(date +'%Y-%m-%d %H:%M')" || echo "No changes to commit"
          git push origin main
